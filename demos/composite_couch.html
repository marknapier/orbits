<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Composite Couch</title>
  <style>
    body {
      margin: 100px;
      padding: 0;
      height: 100vh;
      /* display: flex; */
      justify-content: center;
      align-items: center;
      background-color: rgb(244, 246, 254);
      background-image: url('../images/wood_panelling_light_s.jpg');
    }

    canvas {
      display: block;
      border: 1px solid black;
    }
  </style>
</head>

<body>
</body>

<script type="module">
  import PhysicsEngine from '../js/physics2D/PhysicsEngine.js';
  import RendererSimple from '../js/app/RenderSimple.js';
  import MouseHandler from '../js/app/MouseHandler.js';
  import AnimationLoop from '../js/app/AnimationLoop.js';
  import MovingImageDots from '../js/app/MovingImageDots.js';
  import MovingImagePlaid from '../js/app/MovingImagePlaid.js';
  import ImageLoader from '../js/app/ImageLoader.js';
  import Particle from '../js/physics2D/Particle.js';
  import Vector2D from '../js/physics2D/Vector2D.js';

  function createCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.id = 'sim';
    canvas.width = width;
    canvas.height = height;
    document.body.appendChild(canvas);
    return canvas;
  }

  class RenderCouchWithDots extends RendererSimple {
    constructor(particles = [], springs = [], target) {
      super(particles, null, target);
      this.bgColor = 'rgb(250, 250, 250)';
      this.movingImageDots = new MovingImageDots(700, 700);
      this.movingImagePlaid = new MovingImagePlaid(700, 700);
    }

    async init() {
      this.couchImage = await ImageLoader.loadImage('../images/brown_leather_couch.png');

      // Create off-screen canvas for couch with dots
      this.canvasCouch = document.createElement('canvas');
      document.body.appendChild(this.canvasCouch); // debug
      this.canvasCouch.width = this.canvas.width;
      this.canvasCouch.height = this.canvas.height;
      this.ctxCouch = this.canvasCouch.getContext('2d');
      // Draw the couch image as the background
      this.ctxCouch.drawImage(this.couchImage, 50, 40, this.canvas.width - 100, this.canvas.height - 80);

      // Create off-screen canvas for background
      this.canvasBackground = document.createElement('canvas');
      document.body.appendChild(this.canvasBackground); // debug
      this.canvasBackground.width = this.canvas.width;
      this.canvasBackground.height = this.canvas.height;
      this.ctxBackground = this.canvasBackground.getContext('2d');
    }

    render() {
      // Update the moving image (dots)
      this.movingImageDots.step();
      this.movingImagePlaid.step();

      // Background layer: big dots
      this.ctxBackground.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.ctxBackground.globalAlpha = 1.0;
      this.ctxBackground.globalCompositeOperation = 'source-over';
      this.ctxBackground.drawImage(this.movingImagePlaid.getCanvas(), 0, 0, this.canvas.width, this.canvas.height);

      // Couch layer: dots in couch
      this.ctxCouch.globalAlpha = 0.1;
      this.ctxCouch.globalCompositeOperation = 'source-atop';
      for (const particle of this.particles) {
        this.paintParticle(this.ctxCouch, particle);
      }

      // Main layer: background + couch with dots overlayed
      // clear
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      // draw background dots
      this.ctx.globalCompositeOperation = 'source-over';
      this.ctx.globalAlpha = 1.0;
      this.ctx.drawImage(this.canvasBackground, 0, 0, this.canvas.width, this.canvas.height);
      // draw plain couch
      this.ctx.globalAlpha =  1.0;
      this.ctx.drawImage(this.couchImage, 50, 40, this.canvas.width - 100, this.canvas.height - 80);
      // Set composite mode to overlay
      // this.ctx.globalCompositeOperation = 'overlay';
      // this.ctx.drawImage(this.canvasCouch, 0, 0, this.canvas.width, this.canvas.height);
      this.ctx.globalCompositeOperation = 'overlay';
      this.ctx.drawImage(this.canvasCouch, 0, 0, this.canvas.width, this.canvas.height);
      this.ctx.drawImage(this.canvasCouch, 0, 0, this.canvas.width, this.canvas.height);

      // reset
      this.ctx.globalCompositeOperation = 'source-over';
    }

    paintParticle(ctx, particle) {
      if (!particle || !particle.pos) return;
      const x = particle.getX();
      const y = particle.getY();
      const r = particle.getRadius();
      ctx.save();
      {
        // Create circle clipping path
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.clip();
        // Draw the moving image scaled to fit the circle's bounding box
        ctx.drawImage(this.movingImageDots.getCanvas(), x - r, y - r, 2 * r, 2 * r);
      }
      ctx.restore();
    }
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = createCanvas(800, 600);

      // Make 2 large random particles
      const particles = [];
      for (let i = 0; i < 2; i++) {
        const name = `particle${i}`;
        const posX = Math.random() * canvas.width;
        const posY = Math.random() * canvas.height;
        const velX = (Math.random() - 0.5) * 30; // Random velocity between -25 and 25
        const velY = (Math.random() - 0.5) * 30;
        const mass = Math.random() * 9 + 1; // Random mass between 1 and 10
        const radius = Math.random() * 50 + 100; // Random radius between 10 and 50
        const color = `rgb(${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)})`;

        particles.push(new Particle(
          name,
          new Vector2D(posX, posY), // random position
          new Vector2D(velX, velY), // random velocity
          new Vector2D(0, 0), // force
          mass, // random mass
          radius, // random radius
        ));
        particles[i].setColor(color); // set random color
      }

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = true;
      engine.setWallTypeStr('reflecting');
      engine.addParticles(particles);
      engine.detectCollisions = false;
      engine.margin = 0;
      engine.gravY = 0;

      const renderer = new RenderCouchWithDots(engine.particles, engine.springs, canvas);
      await renderer.init();

      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      const animationLoop = new AnimationLoop(() => {
        engine.step();
        renderer.render();
      });
      animationLoop.start();

      window.engine = engine; // Expose for debugging

      console.log('String simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();
</script>

</html>
