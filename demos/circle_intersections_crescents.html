<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Circle Intersections</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
    }

    canvas {
      display: block;
      border: 1px solid black;
    }
  </style>
</head>

<body>
</body>

<script type="module">
  import PhysicsEngine from '../js/physics2D/PhysicsEngine.js';
  import RenderSimple from '../js/app/RenderSimple.js';
  import MouseHandler from '../js/app/MouseHandler.js';
  import AnimationLoop from '../js/app/AnimationLoop.js';
  import MovingImageDots from '../js/app/MovingImageDots.js';
  import Particle from '../js/physics2D/Particle.js';
  import Spring from '../js/physics2D/Spring.js';
  import Vector2D from '../js/physics2D/Vector2D.js';
  import Circles from '../js/app/Circles.js';
  import Oscillator from '../js/app/Oscillator.js';

  function createCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.id = 'sim';
    canvas.width = width;
    canvas.height = height;
    document.body.appendChild(canvas);
    return canvas;
  }

  class RenderIntersections extends RenderSimple {
    constructor(particles = [], springs = [], target, movingImageDots) {
      super(particles, null, target);
      this.movingImageDots = movingImageDots;
      this.bgColor = 'rgb(253, 253, 250)';
    }

    render() {
      this.clear();
      this.paintIntersections();
      this.paintArcMadeByLine();
      for (const particle of this.particles) {
        this.paintParticle(this.ctx, particle);
      }
    }

    paintIntersections() {
      const p1 = this.particles[0];
      const p2 = this.particles[1];
      const p3 = this.particles[2];
      const r1 = p1.getRadius();
      const r2 = p2.getRadius();
      const x1 = p1.getX();
      const y1 = p1.getY();
      const x2 = p2.getX();
      const y2 = p2.getY();
      const lineX = p3.getX();
      const interPointsC = Circles.getCircleIntersections(x1, y1, r1, x2, y2, r2);
      const interPointsL1 = Circles.getLineCircleIntersections(lineX, 0, lineX, this.canvas.height, x1, y1, r1);
      const interPointsL2 = Circles.getLineCircleIntersections(lineX, 0, lineX, this.canvas.height, x2, y2, r2);

      if (interPointsC.length === 2) {
        this.paintPoint(this.ctx, interPointsC[0].x, interPointsC[0].y);
        this.paintPoint(this.ctx, interPointsC[1].x, interPointsC[1].y);
      }
      if (interPointsL1.length > 0) {
        this.paintPoint(this.ctx, interPointsL1[0].x, interPointsL1[0].y);
        this.paintPoint(this.ctx, interPointsL1[1].x, interPointsL1[1].y);
      }
      if (interPointsL2.length > 0) {
        this.paintPoint(this.ctx, interPointsL2[0].x, interPointsL2[0].y);
        this.paintPoint(this.ctx, interPointsL2[1].x, interPointsL2[1].y);
      }
    }

    paintArcMadeByLine() {
      const p1 = this.particles[0];
      const p2 = this.particles[1];
      const p3 = this.particles[2];
      const r1 = p1.getRadius();
      const r2 = p2.getRadius();
      const x1 = p1.getX();
      const y1 = p1.getY();
      const x2 = p2.getX();
      const y2 = p2.getY();
      const lineX = p3.getX();
      const overlapShapes1 = Circles.getLineOverlapShapes(lineX, 0, lineX, this.canvas.height, x1, y1, r1);
      const overlapShapes2 = Circles.getLineOverlapShapes(lineX, 0, lineX, this.canvas.height, x2, y2, r2);
      const overlapShapesC = Circles.getOverlapShapes(x1, y1, r1, x2, y2, r2);
      // if (overlapShapes1) {
      //   const arc = overlapShapes1.arc1;
      //   this.ctx.save();
      //   this.ctx.fillStyle = 'rgba(120, 20, 190, 0.6)'; // Purpl-ish
      //   this.ctx.lineWidth = 8;
      //   this.ctx.beginPath();
      //   this.ctx.arc(arc.x, arc.y, arc.r, arc.angleStart, arc.angleEnd, arc.counterClockwise);
      //   this.ctx.closePath();
      //   this.ctx.fill();
      //   this.ctx.restore();
      // }
      // if (overlapShapes2) {
      //   const arc = overlapShapes2.arc1;
      //   this.ctx.save();
      //   this.ctx.fillStyle = 'rgba(20, 120, 190, 0.6)'; // Blue-ish
      //   this.ctx.lineWidth = 8;
      //   this.ctx.beginPath();
      //   this.ctx.arc(arc.x, arc.y, arc.r, arc.angleStart, arc.angleEnd, arc.counterClockwise);
      //   this.ctx.closePath();
      //   this.ctx.fill();
      //   this.ctx.restore();
      // }
      if (overlapShapesC) {
        const arc1 = overlapShapesC.crescent1.arc1;
        const arc2 = overlapShapesC.crescent1.arc2;
        const arc3 = overlapShapesC.crescent2.arc1;
        const arc4 = overlapShapesC.crescent2.arc2;
        this.ctx.save();
        {
          this.ctx.fillStyle = 'rgba(190, 120, 20, 0.6)'; // Orange-ish
          this.ctx.beginPath();
          this.ctx.arc(arc1.x, arc1.y, arc1.r, arc1.angleStart, arc1.angleEnd, arc1.counterClockwise);
          this.ctx.arc(arc2.x, arc2.y, arc2.r, arc2.angleStart, arc2.angleEnd, arc2.counterClockwise);
          this.ctx.fill();

          this.ctx.fillStyle = 'rgba(20, 120, 190, 0.6)'; // Blue-ish
          this.ctx.beginPath();
          this.ctx.arc(arc3.x, arc3.y, arc3.r, arc3.angleStart, arc3.angleEnd, arc3.counterClockwise);
          this.ctx.arc(arc4.x, arc4.y, arc4.r, arc4.angleStart, arc4.angleEnd, arc4.counterClockwise);
          this.ctx.fill();
        }
        this.ctx.restore();
      }
    }

    paintParticle(ctx, particle) {
      if (!particle || !particle.pos) return;
      const x = particle.getX();
      const y = particle.getY();
      const r = particle.getRadius();

      ctx.save();
      {
        ctx.beginPath();
        ctx.strokeStyle = particle.getColor();
        ctx.lineWidth = 2;
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();

        if (particle.label === 'line') {
          this.drawLineV(particle.getX(), particle.getY());
        }
      }
      ctx.restore();
    }

    paintPoint(ctx, x, y) {
      ctx.save();
      {
        // this.ctx.globalAlpha = 0.91;
        ctx.strokeStyle = 'rgba(120, 20, 190, 1.0)'; // Purpl-ish
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    drawLineV(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(x, 0);
      this.ctx.lineTo(x, this.canvas.height);
      this.ctx.stroke();
    }

    drawLineH(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(0, y);
      this.ctx.lineTo(this.canvas.width, y);
      this.ctx.stroke();
    }
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = createCanvas(970, 600);

      // Make 2 large random particles
      const particles = [];
      const baseRadii = [];

      for (let i = 0; i < 3; i++) {
        const name = `particle${i}`;
        const posX = canvas.width / 2 + (Math.random() - 0.5) * 100;
        const posY = canvas.height / 2 + (Math.random() - 0.5) * 100;
        const velX = (Math.random() - 0.5) * 30; // Random velocity between -25 and 25
        const velY = (Math.random() - 0.5) * 30;
        const mass = Math.random() * 10 + 5; // Random mass between 5 and 15
        const radius = (Math.random() * 100) + 200; // Random radius 
        const color = `rgb(${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)})`;

        particles.push(new Particle(
          name,
          new Vector2D(posX, posY), // random position
          new Vector2D(velX, velY), // random velocity
          new Vector2D(0, 0), // force
          mass, // random mass
          radius, // random radius
        ));
        baseRadii.push(radius); // Store base radius for oscillation
        particles[i].setColor(color); // set random color
      }

      particles[2].setRadius(2);
      particles[2].setLabel('line');

      // Create oscillators for the first two particles (20-second cycle, ±100 pixels)
      const oscillators = [];
      for (let i = 0; i < 2; i++) {
        oscillators.push(new Oscillator(1/20, 'sin', i * Math.PI)); // Stagger phase for different timing
      }

      const spring = new Spring(
        particles[0],
        particles[1],
        5,  // spring constant
        1,  // damping
        0   // springLength will be set to current distance between particles by Spring constructor
      );

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = true;
      engine.setWallTypeStr('reflecting');
      engine.addParticles(particles);
      engine.addSpring(spring);
      engine.detectCollisions = false;
      engine.margin = 50;
      engine.gravY = 0;
      engine.timeStep = .05;
      engine.gravConst = 10;

      const renderer = new RenderIntersections(engine.particles, engine.springs, canvas);
      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      const animationLoop = new AnimationLoop(() => {
        // Update oscillating radii for the first two particles
        for (let i = 0; i < 2; i++) {
          const newRadius = baseRadii[i] + oscillators[i].getValue() * 50;
          particles[i].setRadius(Math.max(newRadius, 10)); // Ensure minimum radius
        }
        engine.step();
        renderer.render();
      });
      animationLoop.start();

      window.engine = engine; // Expose for debugging

      console.log('String simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();
</script>

</html>
