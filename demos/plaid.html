<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Plaid effect</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      border: 1px solid black
    }
  </style>
</head>

<body>
</body>

<script type="module">
  import PhysicsEngine from '../js/physics2D/PhysicsEngine.js';
  import RendererSimple from '../js/app/RenderSimple.js';
  import MouseHandler from '../js/app/MouseHandler.js';
  import AnimationLoop from '../js/app/AnimationLoop.js';
  import Particle from '../js/physics2D/Particle.js';
  import Vector2D from '../js/physics2D/Vector2D.js';

  function createCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.id = 'sim';
    canvas.width = width;
    canvas.height = height;
    document.body.appendChild(canvas);
    return canvas;
  }

  class RenderPlaid extends RendererSimple {
    constructor(particles = [], springs = [], target) {
      super(particles, null, target);
      this.bgColor = 'rgb(253, 253, 250)';
      this.ctx.globalAlpha = 0.4;
    }

    render() {
      for (const particle of this.particles) {
        this.ctx.save();
        this.ctx.strokeStyle = particle.getColor();
        this.ctx.lineWidth = particle.getRadius() * 2;
        this.drawLineV(particle.getX(), particle.getY());
        this.drawLineH(particle.getX(), particle.getY());
        this.ctx.restore();
      }
    }

    drawLineV(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(x, 0);
      this.ctx.lineTo(x, this.canvas.height);
      this.ctx.stroke();
    }

    drawLineH(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(0, y);
      this.ctx.lineTo(this.canvas.width, y);
      this.ctx.stroke();
    }
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = createCanvas(800, 600);

      // Make 20 random particles
      const particles = [];
      for (let i = 0; i < 20; i++) {
        const name = `particle${i}`;
        const posX = Math.random() * canvas.width;
        const posY = Math.random() * canvas.height;
        const velX = (Math.random() - 0.5) * 6; // Random velocity between -3 and 3
        const velY = (Math.random() - 0.5) * 6;
        const mass = Math.random() * 9 + 1; // Random mass between 1 and 10
        const radius = Math.random() * 98 + 2; // Random radius between 2 and 100
        const color = `rgb(${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)}, ${Math.floor(Math.random() * 256)})`;

        particles.push(new Particle(
          name,
          new Vector2D(posX, posY), // random position
          new Vector2D(velX, velY), // random velocity
          new Vector2D(0, 0), // force
          mass, // random mass
          radius, // random radius
        ));
        particles[i].setColor(color); // set random color
      }

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = true;
      engine.setWallTypeStr('reflecting');
      engine.addParticles(particles);
      engine.gravY = 0;

      const renderer = new RenderPlaid(engine.particles, engine.springs, canvas);
      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      const animationLoop = new AnimationLoop(engine, renderer);
      animationLoop.start();

      window.engine = engine; // Expose for debugging

      console.log('String simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();
</script>

</html>
