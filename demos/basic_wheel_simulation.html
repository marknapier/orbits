<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Physics2D Basic Gravity Simulation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display:block; 
      border: 1px solid black
    }
  </style>
</head>

<body>
</body>

<script type="module">
  import PhysicsEngine from '../js/physics2D/PhysicsEngine.js';
  import Particle from '../js/physics2D/Particle.js';
  import Spring from '../js/physics2D/Spring.js';
  import Vector2D from '../js/physics2D/Vector2D.js';
  import Renderer from '../js/app/RenderSimple.js';
  import MouseHandler from '../js/app/MouseHandler.js';
  import AnimationLoop from '../js/app/AnimationLoop.js';
  import Blob from '../js/app/Blob.js';

  class Wheel {
    constructor(engine, centerX, centerY, radius = 100, numParticles = 12) {
      this.engine = engine;
      this.centerX = centerX;
      this.centerY = centerY;
      this.radius = radius;
      this.numParticles = numParticles;
      this.centerParticle = null;
      this.outerParticles = [];
      
      this.build();
    }

    build() {
      // Create central particle
      this.centerParticle = new Particle(
        `center_${this.centerX}_${this.centerY}`,
        new Vector2D(this.centerX, this.centerY),
        new Vector2D(0, 0),
        new Vector2D(0, 0),
        5,  // mass
        15  // radius
      );
      this.centerParticle.setColor('rgb(255, 0, 0)'); // Red for center
      this.engine.addParticle(this.centerParticle);

      // Create particles in a circle
      for (let i = 0; i < this.numParticles; i++) {
        const angle = (i / this.numParticles) * 2 * Math.PI;
        const x = this.centerX + this.radius * Math.cos(angle);
        const y = this.centerY + this.radius * Math.sin(angle);

        const particle = new Particle(
          `particle_${this.centerX}_${this.centerY}_${i}`,
          new Vector2D(x, y),
          new Vector2D(0, 0),
          new Vector2D(0, 0),
          3,  // mass
          10  // radius
        );
        particle.setColor('rgb(0, 100, 255)'); // Blue for outer particles
        particle.horiFriction = true; // Enable horizontal friction
        this.engine.addParticle(particle);
        this.outerParticles.push(particle);
      }

      // Create springs connecting consecutive outer particles (the ring)
      for (let i = 0; i < this.numParticles; i++) {
        const nextI = (i + 1) % this.numParticles;
        const spring = new Spring(
          this.outerParticles[i],
          this.outerParticles[nextI],
          20,      // spring constant
          0.9,    // damping
          this.radius * Math.sin(Math.PI / this.numParticles) * 2  // rest length (chord length)
        );
        this.engine.addSpring(spring);
      }

      // Create springs connecting each outer particle to the center (spokes)
      for (let i = 0; i < this.numParticles; i++) {
        const spring = new Spring(
          this.outerParticles[i],
          this.centerParticle,
          5,      // spring constant (stronger for spokes)
          0.8,    // damping
          this.radius  // rest length (radius)
        );
        this.engine.addSpring(spring);
      }

      // Create 4 bracing springs connecting opposite particles across the wheel
      const bracingPairs = [
        [0, 6],
        [3, 9],
        [1, 7],
        [4, 10]
      ];
      
      for (const [i, j] of bracingPairs) {
        const spring = new Spring(
          this.outerParticles[i],
          this.outerParticles[j],
          20,                    // spring constant
          0.8,                  // damping
          this.radius * 2      // rest length (diameter)
        );
        this.engine.addSpring(spring);
      }
    }
  }

  function createCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.id = 'sim';
    canvas.width = width;
    canvas.height = height;
    document.body.appendChild(canvas);
    return canvas;
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = createCanvas(800, 600);

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = true;
      engine.setWallTypeStr('reflecting');
      engine.gravX = 0; // WTF??? not working

      // Create three wheels
      const wheel1 = new Wheel(engine, 200, 150, 100, 12);
      const wheel2 = new Wheel(engine, 600, 150, 100, 12);
      const wheel3 = new Wheel(engine, 400, 450, 100, 12);

      // Create a blob from wheel1's outer particles
      const blob = new Blob(12);
      for (const particle of wheel1.outerParticles) {
        blob.addKnot({ x: particle.pos.x, y: particle.pos.y });
      }

      const renderer = new Renderer(engine.particles, engine.springs, canvas);
      
      // Wrap the renderer's render method to also draw the blob
      const originalRender = renderer.render.bind(renderer);
      renderer.render = function() {
        originalRender();
        // Update blob knots from wheel1 particles
        blob.clear();
        for (const particle of wheel1.outerParticles) {
          blob.addKnot({ x: particle.pos.x, y: particle.pos.y });
        }
        blob.makePolygon();
        blob.draw(this.ctx, { strokeStyle: 'rgb(255, 100, 0)', lineWidth: 30 });
      };
      
      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      const animationLoop = new AnimationLoop(engine, renderer);
      animationLoop.start();

      window.engine = engine; // Expose for debugging

      console.log('String simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }
  
  loadAndRunSimulation();
</script>
</html>
