<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassini 1</title>
  <link rel="stylesheet" href="./styles/full_viewport_canvas.css">
</head>

<body>
  <button class="btn-back" onclick="history.back()" aria-label="Go back">&#8249;</button>  
  <!-- Canvas will be inserted here -->
</body>

<script type="module">
  import PhysicsEngine from './js/physics2D/PhysicsEngine.js';
  import Vector2D from './js/physics2D/Vector2D.js';
  import MouseHandler from './js/app/MouseHandler.js';
  import AnimationLoop from './js/app/AnimationLoop.js';
  import RenderCassini from './js/app/RenderCassini.js';
  import Model from './js/app/Model.js';
  import Page from './js/app/Page.js'

  const modelJSON = {
    "environment": {
      "wallType": "Reflecting",
      "wallFriction": 0.5,
      "gravityConstant": 10.0,
      "electricConstant": 0.0,
      "gravityFieldX": 0.0,
      "gravityFieldY": 0.0,
      "electricFieldX": 0.0,
      "electricFieldY": 0.0,
      "magneticFieldZ": 0.0,
      "airResistance": 0.10,
    },
    "particles": [
      {
        "particleNumber": 0,
        "label": "one",
        "color": "blue",
        "initialPositionX": 256.0,
        "initialPositionY": 200.0,
        "initialVelocityX": 0.0,
        "initialVelocityY": 0.0,
        "radius": 26.0,
        "mass": 35.0,
        "charge": 0.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": false
      },
      {
        "particleNumber": 1,
        "label": "two",
        "color": "green",
        "initialPositionX": 400.0,
        "initialPositionY": 100.0,
        "initialVelocityX": 0.0,
        "initialVelocityY": 0.0,
        "radius": 3.0,
        "mass": 30.0,
        "charge": 0.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": true
      },
      {
        "particleNumber": 2,
        "label": "three",
        "color": "green",
        "initialPositionX": 500.0,
        "initialPositionY": 180.0,
        "initialVelocityX": 0.0,
        "initialVelocityY": 0.0,
        "radius": 4.0,
        "mass": 80.0,
        "charge": 0.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": true
      },
      {
        "particleNumber": 3,
        "label": "four",
        "color": "black",
        "initialPositionX": 507.0,
        "initialPositionY": 313.0,
        "initialVelocityX": 0.0,
        "initialVelocityY": 0.0,
        "radius": 20.0,
        "mass": 50.0,
        "charge": 0.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": true
      }
    ],
    "springs": []
  };

  function createCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.id = 'sim';
    canvas.width = width;
    canvas.height = height;
    document.body.appendChild(canvas);
    return canvas;
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = createCanvas(window.innerWidth, window.innerHeight);

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = false;
      engine.timeStep *= Page.scaleFactor; // scale time step to keep velocity in proportion to canvas size

      const model = new Model();
      model.parseConfig(modelJSON);
      model.centerAt(canvas.width / 2.2, canvas.height/2);

      engine.addModel(model.getParticles(), model.getSprings(), model.getEnvironment());

      const renderer = new RenderCassini(engine.particles, null, canvas );
      const RB = renderer
      RB.bgColor = 'rgb(20, 0, 20)';
      RB.opacity = 0.08;
      RB.clearBG = false;
      engine.particles[3].pos = new Vector2D(300 + (Math.random()*200), 300 + (Math.random()*200));
      engine.particles[3].color = 'rgba(10, 0, 10, .6)'; // fade black
      renderer.clear();

      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      mouseHandler.hideCursorAfterDelay();

      const animationLoop = new AnimationLoop(engine, renderer);
      animationLoop.start();

      Page.setupKeyEvents(canvas, animationLoop, 'cassini3');

      window.engine = engine; // Expose for debugging
      console.log('Simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }
  
  loadAndRunSimulation();

</script>
</html>
