  async function loadAndRunSimulation() {
    try {
      const canvas = Page.createCanvas(window.innerWidth, window.innerHeight);

      const model = new Model();
      model.parseConfig(modelJSON_ORIG);
      model.centerAt(canvas.width / 2.2, canvas.height/2);

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.addModel(model.getParticles(), model.getSprings(), model.getEnvironment());
      engine.detectCollisions = false;

      // main drawing canvas
      const renderer = new RenderSynapse(engine.particles, engine.springs, canvas );
      renderer.clear();

      // overlay canvas, on top of main drawing
      const canvas2 = Page.createCanvas(canvas.width, canvas.height, 'sim2')
      const renderer2 = new RenderSynapseOverlay(engine.particles, engine.springs, canvas2 );

      // mouse listens for events on the top canvas
      const mouseHandler = new MouseHandler(canvas2, engine, renderer2);
      mouseHandler.hideCursorAfterDelay();

      // animation loop calls update function that draws both canvases
      const animationLoop = new AnimationLoop(() => {
        engine.step();
        renderer.render();
        renderer2.render();
      });
      animationLoop.start();

      Page.setupKeyEvents(canvas, animationLoop, 'synapse');  

      console.log('Simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }
  
  loadAndRunSimulation();
