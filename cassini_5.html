<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassini 4</title>
  <link rel="stylesheet" href="./styles/full_viewport_canvas.css">
</head>

<body class="canvas-wrapper">
  <button class="btn-back" onclick="history.back()" aria-label="Go back">&#8249;</button>
  <!-- Canvas will be inserted here -->
</body>

<script type="module">
  import PhysicsEngine from './js/physics2D/PhysicsEngine.js';
  import Vector2D from './js/physics2D/Vector2D.js';
  import MouseHandler from './js/app/MouseHandler.js';
  import AnimationLoop from './js/app/AnimationLoop.js';
  import RenderLenses from './js/app/RenderLenses.js';
  import RenderLensesOrig from './js/app/RenderLensesOrig.js';
  import RenderLensesBlueGreenWithGuidesOnlyArcs from './js/app/RenderLensesBlueGreenWithGuidesOnlyArcs.js';
  import RenderLensesBlueGreenWithGuides from './js/app/RenderLensesBlueGreenWithGuides.js';
  import RenderLensesGreenArcs from './js/app/RenderLensesGreenArcs.js';
  import RenderLensesNoVioletFill from './js/app/RenderLensesNoVioletFill.js';
  import RenderLensesHelloYellow from './js/app/RenderLensesHelloYellow.js';
  import Model from './js/app/Model.js';
  import Page from './js/app/Page.js'

  const modelJSON = {
    "environment": {
      "wallType": "Reflecting",
      "wallFriction": 0.5,
      "gravityConstant": 12.0,
      "electricConstant": 0.0,
      "gravityFieldX": 0.0,
      "gravityFieldY": 0.0,
      "electricFieldX": 0.0,
      "electricFieldY": 0.0,
      "magneticFieldZ": 0.0,
      "airResistance": 0.15,
    },
    "particles": [
      {
        "particleNumber": 0,
        "label": "one",
        "color": "blue",
        "initialPositionX": 200.0,
        "initialPositionY": 250.0,
        "radius": 5.0,
        "mass": 85.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 1,
        "label": "giant",
        "color": "green",
        "initialPositionX": -400,
        "initialPositionY": 180,
        "radius": 10.0,
        "mass": 100.0,
        "fixedXPosition": true,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 2,
        "label": "three",
        "color": "blue",
        "initialPositionX": 500.0,
        "initialPositionY": 420.0,
        "radius": 5.0,
        "mass": 10.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 3,
        "label": "four",
        "color": "green",
        "initialPositionX": 900.0,
        "initialPositionY": 150.0,
        "radius": 7.0,
        "mass": 60.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 4,
        "label": "five",
        "color": "green",
        "initialPositionX": 0.0,
        "initialPositionY": 200.0,
        "radius": 2.0,
        "mass": 150.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": false
      },
      {
        "particleNumber": 5,
        "label": "red",
        "color": "green",
        "initialPositionX": 10.0,
        "initialPositionY": 450.0,
        "radius": 0.5,
        "mass": 10.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": false
      },
      {
        "particleNumber": 6,
        "label": "tiny",
        "color": "green",
        "initialPositionX": 240.0,
        "initialPositionY": 550.0,
        "radius": 0.2,
        "mass": 30.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": false
      },
    ],
    "springs": []
  };

  async function loadAndRunSimulation() {
    try {
      const canvas = Page.createCanvas(window.innerWidth, window.innerHeight, 'sim');

      const model = new Model();
      model.parseConfig(modelJSON);
      model.scalePositions(Page.scaleFactor); // scale first, then center
      model.centerAt(canvas.width / 2, canvas.height / 3);

      const model2 = new Model();
      model2.parseConfig(modelJSON);
      model2.scalePositions(Page.scaleFactor); // scale first, then center
      model2.centerAt(canvas.width / 1.5, canvas.height / 1.5);
      model2.particles[1].setFixedX(false);

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.addModel(model.getParticles(), model.getSprings(), model.getEnvironment());
      engine.addModel(model2.getParticles(), model2.getSprings(), model2.getEnvironment());
      engine.detectCollisions = false;
      engine.timeStep *= Page.scaleFactor; // scale time step to keep velocity in proportion to canvas size

      // const renderer = new RenderLensesOrig(engine.particles, engine.springs, canvas);
      const renderer = new RenderLenses(engine.particles, engine.springs, canvas);
      // const renderer = new RenderLensesHelloYellow(engine.particles, engine.springs, canvas);
      // const renderer = new RenderLensesBlueGreenWithGuides(engine.particles, engine.springs, canvas);
      // const renderer = new RenderLensesBlueGreenWithGuidesOnlyArcs(engine.particles, engine.springs, canvas);
      // const renderer = new RenderLensesGreenArcs(engine.particles, engine.springs, canvas);
      await renderer.init(Page.scaleFactor);
      renderer.clear();

      // mouse listens for events on the top canvas
      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      mouseHandler.hideCursorAfterDelay();

      // animation loop calls update function that animates and renders the simulation
      const animationLoop = new AnimationLoop(() => {
        engine.step();
        renderer.render();
      });
      animationLoop.start();

      // setup screen capture and pause keys, also stop/start sin curve generators
      Page.setupKeyEvents(canvas, animationLoop, 'cassini5');
      Page.onPause(() => renderer.pauseOscillators());
      Page.onResume(() => renderer.resumeOscillators());

      console.log('Simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();
</script>

</html>
