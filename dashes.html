  class RenderDashes extends RenderSimple {
    bgColor = "rgb(60,0,0)";          // background color
    opacity = 0.5;                      // alpha for all paint operations
    clearBG = true;                     // if false, leaves motion trails
    violetColors = ["rgb(25, 15, 30)", "rgb(20, 10, 25)", "rgb(15, 5, 20)", "rgb(10, 0, 15)"];

    constructor(particles = [], springs = null, canvas) {
      super(particles, null, canvas);
      this.canvas = canvas;
      this.ctx = canvas.getContext("2d");
      this.particles = particles;
      this.woodPattern = null;
      this.bgTexture = null;
      this.xOscillator = new Oscillator(.0167, 'cos'); // .0167 => 1 minute cycle
      this.yOscillator = new Oscillator(.0167, 'sin');
      this.seconds = new Oscillator(1, 'sin');
      this.halfWidth = this.canvas.width / 2;
      this.halfHeight = this.canvas.height / 2;
    }

    setParticles(particles) {
      this.particles = particles ?? [];
    }

    async init() {
      try {
        this.bgTexture = await ImageLoader.loadImage('./images/wood_panelling_light_s.jpg');
        this.ctx.drawImage(this.bgTexture, 0, 0, this.canvas.width, this.canvas.height);
        this.woodPattern = this.ctx.createPattern(this.bgTexture, 'repeat');
      } catch (error) {
        console.error(error.message);
      }
    }

    render() {
      const ctx = this.ctx;
      const w = this.canvas.width;
      const h = this.canvas.height;

      const ex = this.halfWidth + (this.xOscillator.getValue() * this.halfWidth);
      const ey = this.halfHeight + (this.yOscillator.getValue() * this.halfHeight);
      const dashsize = 1 + Math.abs(this.yOscillator.getValue()) * 100;
      const yellow = this.seconds.getValue() > 0;

      const particles = this.particles;

      const p0 = particles[0];
      const p1 = particles[1];
      const p2 = particles[2];
      const p3 = particles[3];

      if (this.clearBG) {
        ctx.save();
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = this.bgColor;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
      }

      ctx.save();
      {
        ctx.globalAlpha = 0.9; //this.opacity;

        ctx.save();
        {
          if (yellow) {
            ctx.strokeStyle = 'rgba(255, 251, 21, 0.46)';
          }
          else {
            ctx.strokeStyle = 'rgba(80, 237, 255, 0.4)';
          }
          ctx.lineWidth = 5;
          ctx.setLineDash([dashsize, 101 - dashsize]);
          this.drawArcPath(ctx, p0, p1); // circle
          ctx.stroke();

          // this.drawEllipseAroundPoints(this.ctx, p0.getX(), p0.getY(), p1.getX(), p1.getY(), 0.9, 50);

          ctx.lineWidth = 25;
          ctx.setLineDash([dashsize / 10, 5]);
          // this.drawLineV(ex, 0);
        }
        ctx.restore();

        // draw green circles at each particle
        ctx.save();
        {
          // ctx.fillStyle = "green";
          ctx.globalAlpha = 0.9;
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            if (p.getLabel() === 'red') {
              ctx.lineWidth = 2;
              ctx.strokeStyle = "rgba(208, 101, 0, 0.51)";
              ctx.fillStyle = "red";
              ctx.setLineDash([1, 19, 20]);
              this.drawLineH(p.getX(), p.getY());
            }
            else if (p.getLabel() === 'green') {
              ctx.lineWidth = 2;
              ctx.strokeStyle = "rgba(44, 217, 151, 0.51)";
              ctx.fillStyle = "green";
              ctx.setLineDash([19, 1, 1]);
              this.drawLineH(p.getX(), p.getY());
            }
            ctx.beginPath();
            ctx.ellipse(p.getX(), p.getY(), 3, 1, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();

      }
      ctx.restore();
    }

    drawArcPath(ctx, p1, p2) {
      // compute midpoint and radius from p1 and p2
      const x1 = p1.getX(), y1 = p1.getY();
      const x2 = p2.getX(), y2 = p2.getY();
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const radius = Math.hypot(x2 - x1, y2 - y1) / 2;
      ctx.beginPath();
      ctx.arc(mx, my, radius, 0, Math.PI * 2);
    }

    drawLineV(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(x, 0);
      this.ctx.lineTo(x, this.canvas.height);
      this.ctx.stroke();
    }

    drawLineH(x, y) {
      this.ctx.beginPath();
      this.ctx.moveTo(0, y);
      this.ctx.lineTo(this.canvas.width, y);
      this.ctx.stroke();
    }

    drawEllipseAroundPoints(ctx, x1, y1, x2, y2, minorRatio = 0.6, padding = 20) {
      const centerX = (x1 + x2) / 2;
      const centerY = (y1 + y2) / 2;

      const dx = x2 - x1;
      const dy = y2 - y1;
      const distance = Math.sqrt(dx * dx + dy * dy);

      const a = distance / 2 + padding;
      const b = a * minorRatio;
      const rotation = Math.atan2(dy, dx);

      // Draw ellipse
      ctx.beginPath();
      ctx.ellipse(centerX, centerY, a, b, rotation, 0, Math.PI * 2);
      ctx.stroke();
    }

    clear() {
      // Draw a filled rectangle that covers the entire canvas
      this.ctx.fillStyle = "black";
      this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    }
  }

  async function loadAndRunSimulation() {
    try {
      const canvas = Page.createCanvas(window.innerWidth, window.innerHeight, 'sim');

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.detectCollisions = false;
      engine.timeStep = 0.1;

      const model = new Model();
      model.parseConfig(modelJSON);
      model.centerAt(canvas.width / 2.2, canvas.height / 2);

      engine.addModel(model.getParticles(), model.getSprings(), model.getEnvironment());

      // const renderer = new RenderSimple(engine.particles, engine.springs, canvas);
      const renderer = new RenderDashes(engine.particles, null, canvas);
      await renderer.init();

      // so background won't clear
      renderer.bgColor = 'rgb(255, 255, 255, 0.0)';

      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      mouseHandler.hideCursorAfterDelay();

      const animationLoop = new AnimationLoop(engine, renderer);
      animationLoop.start();

      Page.setupKeyEvents(canvas, animationLoop, 'hojos1');

      console.log('Simulation started successfully!');
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();
