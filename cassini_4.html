<script type="module">

    },
    "particles": [

        "color": "blue",
        "initialPositionX": 200.0,
        "initialPositionY": 250.0,
        "radius": 5.0,
        "mass": 85.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 1,
        "label": "giant",
        "color": "green",

        "initialPositionY": 180,
        "radius": 10.0,

        "trace": false
      },
      {
        "particleNumber": 2,
        "label": "three",
        "color": "blue",

        "initialPositionY": 420.0,

        "mass": 10.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 3,
        "label": "four",
        "color": "green",
        "initialPositionX": 900.0,
        "initialPositionY": 150.0,
        "radius": 7.0,
        "mass": 60.0,
        "fixedXPosition": false,
        "fixedYPosition": true,
        "trace": false
      },
      {
        "particleNumber": 4,
        "label": "five",
        "color": "green",
        "initialPositionX": 0.0,
        "initialPositionY": 200.0,
        "radius": 2.0,
        "mass": 150.0,
        "fixedXPosition": false,
        "fixedYPosition": false,
        "trace": false
      },
      {
        "particleNumber": 5,
        "label": "six",
        "color": "green",

    ],
    "springs": [
      // {
      //   "springNumber": 0,
      //   "particle1": 4,
      //   "particle2": 5,
      //   "damping": .5,
      //   "springConstant": 5.0,
      //   "relaxedLength": 0,
      //   "amplitude": 0.0,
      //   "frequency": 0.0,
      //   "phase": 0.0
      // },
      // {
      //   "springNumber": 1,
      //   "particle1": 5,
      //   "particle2": 6,
      //   "damping": .15,
      //   "springConstant": 2.0,
      //   "relaxedLength": 0,
      //   "amplitude": 0.0,
      //   "frequency": 0.0,
      //   "phase": 0.0
      // },
    ]
  };

  async function loadAndRunSimulation() {
    try {
      // main drawing canvas
      const canvas = Page.createCanvas(window.innerWidth, window.innerHeight, 'sim');

      const model = new Model();
      model.parseConfig(modelJSON);
      model.centerAt(canvas.width / 3, canvas.height / 2);

      const engine = new PhysicsEngine();
      engine.setDimensions(canvas.width, canvas.height);
      engine.addModel(model.getParticles(), model.getSprings(), model.getEnvironment());
      engine.detectCollisions = false;

      const renderer = new RenderLens(engine.particles, engine.springs, canvas);
      await renderer.init();
      renderer.clear();

      // mouse listens for events on the top canvas
      const mouseHandler = new MouseHandler(canvas, engine, renderer);
      mouseHandler.hideCursorAfterDelay();

      // animation loop calls update function that draws both canvases
      const animationLoop = new AnimationLoop(() => {
        engine.step();
        renderer.render();
      });
      animationLoop.start();

      // setup screen capture and pause keys, also stop/start sin curve generators
      Page.setupKeyEvents(canvas, animationLoop, 'cassini4');
      Page.onPause(() => renderer.pauseOscillators());
      Page.onResume(() => renderer.resumeOscillators());

      console.log('Simulation started successfully!', engine.constructor.name);
    } catch (error) {
      console.error('Failed to initialize simulation:', error);
    }
  }

  loadAndRunSimulation();

</script>

</html>
